apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-insight
  namespace: crypto-insight
  labels:
    app: crypto-insight
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crypto-insight
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: crypto-insight
    spec:
      containers:
        - name: crypto-insight
          image: iivatsal/crypto-insight:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: crypto-insight-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      restartPolicy: Always